name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core==1.11.8
          pip install dbt-snowflake==1.11.4

      - name: Create profiles.yml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dbt_project:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${SNOWFLAKE_ACCOUNT}
                user: ${SNOWFLAKE_USER}
                password: ${SNOWFLAKE_PASSWORD}
                role: DATA_ENGINEER_ROLE
                warehouse: TRANSFORM_WH
                database: CURATED_DB
                schema: STAGING
                threads: 4
          EOF

      - name: dbt debug
        working-directory: dbt_project
        run: dbt debug

      - name: dbt run
        working-directory: dbt_project
        run: dbt run

      - name: dbt test
        working-directory: dbt_project
        run: dbt testname: dbt CI Pipeline

